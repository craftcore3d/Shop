name: Next.js CI Pipeline

on:
  pull_request:
    branches:
      - main
      - stage
      - dev

  push:
    branches:
      - main
      - stage
      - dev


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

      # Step 1
      - name: Checkout repository
        uses: actions/checkout@v4


      # Step 2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      # Step 3
      - name: Install dependencies
        run: npm ci


      # Step 4
      - name: Run ESLint
        run: npm run lint


      # Step 5
      - name: Type checking
        run: npm run type-check


      # Step 6
      - name: Build Next.js application
        run: npm run build